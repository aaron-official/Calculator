name: CI pipeline

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    test-and-lint:
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: Python

        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.12"

            - name: Install dependencies
              run: |
                  python -m pip install --upgrade pip
                  pip install .
                  pip install ruff pytest

            - name: Run ruff linter fix
              run: ruff check --fix .

            - name: Run ruff linter
              run: ruff check .

            - name: Run tests
              run: pytest test_calculator.py
